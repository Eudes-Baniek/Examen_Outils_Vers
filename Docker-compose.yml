version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    env_file: .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - biblio-network

  livres:
    build: ./services/livres
    container_name: service_livres
    env_file: .env
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - biblio-network

  utilisateurs:
    build: ./services/utilisateurs
    container_name: service_utilisateurs
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - biblio-network

  emprunts:
    build: ./services/emprunts
    container_name: service_emprunts
    env_file: .env
    ports:
      - "8003:8000"
    volumes:
      - ./data:/data
    environment:
      - LOANS_EXPORT_PATH=/data/loans.csv
    depends_on:
      db:
        condition: service_healthy
    networks:
      - biblio-network
  reco:         # <--- 2 espaces (Vérifie bien cet alignement !)
    build: ./services/reco
    container_name: service_reco
    volumes:
      - ./models:/models:ro
    environment:
      - MODEL_PATH=/models/model.pkl
      - BOOKS_SERVICE_URL=http://livres:8000
    #env_file: .env
    ports:
      - "8004:8000"
    depends_on:
      - db
      - livres
    networks:
      - biblio-network
networks:
  biblio-network:
    driver: bridge

volumes:
  postgres_data: