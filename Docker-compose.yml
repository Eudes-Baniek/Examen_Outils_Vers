version: '3.8'

services:
  db:
    image: postgres:15
    env_file:
      - .env
    #environment:
      #POSTGRES_USER: dit_user
      #POSTGRES_PASSWORD: dit_password
      #POSTGRES_DB: library_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - biblio-network

  livres:
    build: ./services/livres
    env_file:
      - .env
    ports:
      - "8001:8000"
    depends_on:
      - db
    networks:
      - biblio-network

networks:
  biblio-network:
    driver: bridge

volumes:
  postgres_data: