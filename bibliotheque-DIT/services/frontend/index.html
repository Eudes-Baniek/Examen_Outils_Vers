<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bibliothèque Numérique — DIT</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="header-content">
      <div class="logo">
        <span class="logo-icon">📚</span>
        <div>
          <h1>Bibliothèque Numérique</h1>
          <span class="subtitle">Dakar Institute of Technology</span>
        </div>
      </div>
      <div id="status-bar">
        <span class="status-dot" id="dot-livres" title="Service Livres"></span>
        <span class="status-dot" id="dot-users" title="Service Utilisateurs"></span>
        <span class="status-dot" id="dot-emprunts" title="Service Emprunts"></span>
        <span class="status-dot" id="dot-reco" title="Service Recommandation"></span>
      </div>
    </div>

    <nav>
      <button class="tab-btn active" data-tab="livres">📖 Livres</button>
      <button class="tab-btn" data-tab="utilisateurs">👤 Utilisateurs</button>
      <button class="tab-btn" data-tab="emprunts">📋 Emprunts</button>
      <button class="tab-btn" data-tab="recommandations">🤖 Recommandations</button>
    </nav>
  </header>

  <main>

    <!-- ── NOTIFICATION ── -->
    <div id="notification" class="notification hidden"></div>

    <!-- ═══ TAB : LIVRES ═══════════════════════════════════════════ -->
    <section id="tab-livres" class="tab-content active">
      <div class="section-header">
        <h2>Catalogue des livres</h2>
        <button class="btn btn-primary" onclick="openModal('modal-add-livre')">+ Ajouter un livre</button>
      </div>

      <div class="filters">
        <input id="search-livre" type="text" placeholder="Rechercher par titre, auteur, ISBN..." class="input" />
        <select id="filter-genre" class="input">
          <option value="">Tous les genres</option>
          <option value="informatique">Informatique</option>
          <option value="mathematiques">Mathématiques</option>
          <option value="physique">Physique</option>
          <option value="litterature">Littérature</option>
          <option value="histoire">Histoire</option>
          <option value="economie">Économie</option>
          <option value="autre">Autre</option>
        </select>
        <button class="btn btn-secondary" onclick="loadLivres()">🔍 Rechercher</button>
      </div>

      <div id="livres-stats" class="stats-row"></div>
      <div id="livres-list" class="grid"></div>
    </section>

    <!-- ═══ TAB : UTILISATEURS ════════════════════════════════════ -->
    <section id="tab-utilisateurs" class="tab-content hidden">
      <div class="section-header">
        <h2>Gestion des utilisateurs</h2>
        <button class="btn btn-primary" onclick="openModal('modal-add-user')">+ Nouvel utilisateur</button>
      </div>
      <div id="users-stats" class="stats-row"></div>
      <div id="users-list" class="grid"></div>
    </section>

    <!-- ═══ TAB : EMPRUNTS ════════════════════════════════════════ -->
    <section id="tab-emprunts" class="tab-content hidden">
      <div class="section-header">
        <h2>Gestion des emprunts</h2>
        <button class="btn btn-primary" onclick="openModal('modal-emprunt')">+ Nouvel emprunt</button>
        <button class="btn btn-warning" onclick="loadRetards()">⚠️ Voir les retards</button>
        <button class="btn btn-secondary" onclick="exportCSV()">📥 Export CSV (ML)</button>
      </div>
      <div id="emprunts-stats" class="stats-row"></div>
      <div id="emprunts-list" class="table-container"></div>
    </section>

    <!-- ═══ TAB : RECOMMANDATIONS ═════════════════════════════════ -->
    <section id="tab-recommandations" class="tab-content hidden">
      <div class="section-header">
        <h2>Système de recommandation</h2>
        <button class="btn btn-danger" onclick="trainModel()">🔄 Ré-entraîner le modèle</button>
      </div>

      <div class="reco-search">
        <label>ID Utilisateur :</label>
        <input id="reco-user-id" type="number" placeholder="Ex: 1" class="input input-sm" />
        <input id="reco-n" type="number" placeholder="Nb recommandations" class="input input-sm" value="5" />
        <button class="btn btn-primary" onclick="getRecommendations()">Obtenir les recommandations</button>
      </div>

      <div id="model-info" class="model-info"></div>
      <div id="reco-list" class="grid"></div>
    </section>

  </main>

  <!-- ═══ MODALS ═════════════════════════════════════════════════ -->

  <!-- Modal: Ajouter un livre -->
  <div id="modal-add-livre" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Ajouter un livre</h3>
        <button onclick="closeModal('modal-add-livre')" class="close-btn">✕</button>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Titre *</label>
          <input id="livre-titre" type="text" class="input" placeholder="Titre du livre" />
        </div>
        <div class="form-group">
          <label>Auteur *</label>
          <input id="livre-auteur" type="text" class="input" placeholder="Nom de l'auteur" />
        </div>
        <div class="form-group">
          <label>ISBN *</label>
          <input id="livre-isbn" type="text" class="input" placeholder="978-..." />
        </div>
        <div class="form-group">
          <label>Genre</label>
          <select id="livre-genre" class="input">
            <option value="informatique">Informatique</option>
            <option value="mathematiques">Mathématiques</option>
            <option value="physique">Physique</option>
            <option value="litterature">Littérature</option>
            <option value="histoire">Histoire</option>
            <option value="economie">Économie</option>
            <option value="autre">Autre</option>
          </select>
        </div>
        <div class="form-group">
          <label>Année de publication</label>
          <input id="livre-annee" type="number" class="input" placeholder="2024" />
        </div>
        <div class="form-group">
          <label>Quantité</label>
          <input id="livre-quantite" type="number" class="input" value="1" min="1" />
        </div>
        <div class="form-group full-width">
          <label>Description</label>
          <textarea id="livre-description" class="input" rows="3" placeholder="Description du livre..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-add-livre')">Annuler</button>
        <button class="btn btn-primary" onclick="addLivre()">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Modal: Ajouter un utilisateur -->
  <div id="modal-add-user" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Nouvel utilisateur</h3>
        <button onclick="closeModal('modal-add-user')" class="close-btn">✕</button>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Prénom *</label>
          <input id="user-prenom" type="text" class="input" />
        </div>
        <div class="form-group">
          <label>Nom *</label>
          <input id="user-nom" type="text" class="input" />
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input id="user-email" type="email" class="input" />
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input id="user-tel" type="text" class="input" />
        </div>
        <div class="form-group">
          <label>Type *</label>
          <select id="user-type" class="input">
            <option value="etudiant">Étudiant</option>
            <option value="professeur">Professeur</option>
            <option value="personnel">Personnel</option>
          </select>
        </div>
        <div class="form-group">
          <label>N° Étudiant</label>
          <input id="user-numero" type="text" class="input" placeholder="DIT-2024-..." />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-add-user')">Annuler</button>
        <button class="btn btn-primary" onclick="addUtilisateur()">Créer le compte</button>
      </div>
    </div>
  </div>

  <!-- Modal: Emprunter un livre -->
  <div id="modal-emprunt" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Emprunter un livre</h3>
        <button onclick="closeModal('modal-emprunt')" class="close-btn">✕</button>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>ID Utilisateur *</label>
          <input id="emprunt-user-id" type="number" class="input" placeholder="ID de l'utilisateur" />
        </div>
        <div class="form-group">
          <label>ID Livre *</label>
          <input id="emprunt-livre-id" type="number" class="input" placeholder="ID du livre" />
        </div>
        <div class="form-group full-width">
          <label>Notes</label>
          <input id="emprunt-notes" type="text" class="input" placeholder="Notes optionnelles..." />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-emprunt')">Annuler</button>
        <button class="btn btn-primary" onclick="emprunterLivre()">Confirmer l'emprunt</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
