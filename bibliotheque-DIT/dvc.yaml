stages:

  preprocess:
    cmd: python dvc_pipeline/preprocess.py
    deps:
      - dvc_pipeline/preprocess.py
      - dvc_pipeline/data/loans.csv
    outs:
      - dvc_pipeline/data/loans_clean.csv
    desc: "Nettoyage et préparation des données d'emprunts"

  train:
    cmd: python dvc_pipeline/train.py
    deps:
      - dvc_pipeline/train.py
      - dvc_pipeline/data/loans_clean.csv
      - dvc_pipeline/params.yaml
    params:
      - dvc_pipeline/params.yaml:
          - model
    outs:
      - dvc_pipeline/models/model.pkl
    desc: "Entraînement du modèle SVD/KNN de recommandation"

  evaluate:
    cmd: python dvc_pipeline/evaluate.py
    deps:
      - dvc_pipeline/evaluate.py
      - dvc_pipeline/data/loans_clean.csv
      - dvc_pipeline/models/model.pkl
    metrics:
      - dvc_pipeline/metrics.json:
          cache: false
    desc: "Évaluation du modèle (RMSE, MAE)"
