version: '3.8'

services:
  db:
    image: postgres:15
    env_file:
      - .env
    # En prod-like, on évite d'exposer le port DB sur l'hôte.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - biblio-network

  livres:
    build: ./services/livres
    env_file:
      - .env
    ports:
      - "8001:8000"
    depends_on:
      - db
    networks:
      - biblio-network

networks:
  biblio-network:
    driver: bridge

volumes:
  postgres_data:
