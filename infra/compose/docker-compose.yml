version: '3.8'

services:
  db:
    image: postgres:15
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - biblio-network

  livres:
    build:
      context: ../../services/livres
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8001:8000"
    depends_on:
      - db
    networks:
      - biblio-network

  emprunts:
    build:
      context: ../../services/emprunts
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8002:8000"
    depends_on:
      - db
      - livres
    networks:
      - biblio-network

  reco:
    build:
      context: ../../services/reco
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8003:8000"
    depends_on:
      - db
      - livres
    networks:
      - biblio-network

  utilisateurs:
    build:
      context: ../../services/utilisateurs
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8004:8000"
    depends_on:
      - db
    networks:
      - biblio-network

networks:
  biblio-network:
    driver: bridge

volumes:
  postgres_data:
